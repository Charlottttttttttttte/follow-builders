name: Generate Feeds

on:
  schedule:
    - cron: '17 6 * * *'  # UTC 6:17（避开高峰期，31个batch正好一轮）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Fetch upstream feeds
        run: |
          curl -sL -o /tmp/feed-x.json https://raw.githubusercontent.com/zarazhangrui/follow-builders/main/feed-x.json
          curl -sL -o /tmp/feed-podcasts.json https://raw.githubusercontent.com/zarazhangrui/follow-builders/main/feed-podcasts.json
          curl -sL -o /tmp/feed-blogs-upstream.json https://raw.githubusercontent.com/zarazhangrui/follow-builders/main/feed-blogs.json

      - name: Generate RSS feeds
        run: node scripts/generate-rss-feeds.js

      - name: Copy upstream feeds
        run: |
          cp /tmp/feed-x.json feed-x.json
          cp /tmp/feed-podcasts.json feed-podcasts.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed-x.json feed-podcasts.json feed-blogs.json
          git diff --staged --quiet || (git commit -m "Daily feed update: $(date -I)" && git push)
